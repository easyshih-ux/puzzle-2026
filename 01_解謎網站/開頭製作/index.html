<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>言辵米角刀牛｜開頭製作</title>
  <style>
    :root {
      --paper: #f6f3ee;
      --ink: #111111;
      --accent: #e94032;
      --accent-dark: #bd2b1f;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #000;
      color: var(--ink);
    }

    .screen {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .screen.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .video-screen {
      background: #000;
    }

    .video-screen video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    .video-hint {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: min(92vw, 720px);
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.28);
      color: #ffffff;
      text-align: center;
      font-size: clamp(14px, 1.7vw, 20px);
      font-weight: 700;
      letter-spacing: 0.04em;
      backdrop-filter: blur(8px);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.45);
    }

    .cover-screen {
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.92), rgba(232, 225, 214, 0.96)),
        linear-gradient(rgba(246, 243, 238, 0.06), rgba(246, 243, 238, 0.06));
      opacity: 0;
      visibility: hidden;
    }

    .cover-screen.is-active {
      opacity: 1;
      visibility: visible;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .cover-stage {
      position: relative;
      width: min(96vw, 1672px);
      height: min(96vh, 941px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover-art {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.14);
    }

    .cover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.06));
      border-radius: 8px;
      pointer-events: none;
    }

    .action-wrap {
      position: absolute;
      left: 50%;
      bottom: 17%;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.7s ease 0.35s, transform 0.7s ease 0.35s;
    }

    .cover-screen.is-active .action-wrap {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .action-button {
      border: 0;
      border-radius: 999px;
      padding: 16px 32px;
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #ff7a45);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .action-button:hover,
    .action-button:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 24px 48px rgba(233, 64, 50, 0.35);
      background: linear-gradient(135deg, #ff5647, #ff915f);
      outline: none;
    }

    .hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: rgba(17, 17, 17, 0.75);
      font-size: 14px;
      letter-spacing: 0.05em;
      backdrop-filter: blur(6px);
      opacity: 0;
      transition: opacity 0.7s ease 0.65s;
    }

    .cover-screen.is-active .hint {
      opacity: 1;
    }

    @media (max-width: 900px) {
      .cover-screen.is-active {
        padding: 12px;
      }

      .cover-stage {
        width: 100%;
        height: auto;
      }

      .action-wrap {
        bottom: 15%;
        width: calc(100% - 32px);
      }

      .action-button {
        width: 100%;
        padding: 15px 24px;
      }

      .hint {
        width: calc(100% - 32px);
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="screen video-screen" id="videoScreen" aria-label="開場動畫">
      <video id="introVideo" autoplay playsinline preload="auto">
        <source src="../01言辵米角刀牛開場動畫v2.mp4" type="video/mp4">
        您的瀏覽器不支援影片播放。
      </video>
      <div class="video-hint">若開場動畫沒有自動播放，請先點一下畫面</div>
    </section>

    <section class="screen cover-screen" id="coverScreen" aria-label="課程封面">
      <div class="cover-stage" style="cursor: pointer;">
        <img class="cover-art" src="../課程封面.png" alt="言辵米角刀牛資優班暑期課程封面">
        <div class="cover-overlay" aria-hidden="true"></div>
      </div>
      <div class="hint">開場動畫結束後，點擊畫面進入首頁</div>
    </section>
  </main>

  <script>
    const introVideo = document.getElementById("introVideo");
    const videoScreen = document.getElementById("videoScreen");
    const coverScreen = document.getElementById("coverScreen");

    let hasSwitched = false;

    function showCover() {
      if (hasSwitched) {
        return;
      }

      hasSwitched = true;
      videoScreen.classList.add("is-hidden");
      coverScreen.classList.add("is-active");
    }

    introVideo.addEventListener("ended", showCover);

    introVideo.addEventListener("error", () => {
      showCover();
    });

    // Some browsers block autoplay progression in local files; clicking anywhere resumes playback.
    window.addEventListener("pointerdown", () => {
      if (introVideo.paused && !hasSwitched) {
        introVideo.play().catch(() => {});
      }
    }, { once: true });

    coverScreen.addEventListener("click", () => {
      window.location.href = "../03首頁/home.html";
    });
  </script>
</body>
</html>
